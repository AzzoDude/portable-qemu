name: Build Portable QEMU
on: 
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout QEMU Source
        uses: actions/checkout@v4
        with:
          repository: qemu/qemu
          ref: v9.0.0 

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-python
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-dtc
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-gnutls

      - name: Configure and Compile
        shell: msys2 {0}
        run: |
          mkdir build && cd build
          # --disable-tests avoids the 'qemu_ftruncate64' linker error
          ../configure --target-list=x86_64-softmmu \
                       --enable-whpx \
                       --prefix=/C/QEMU-Portable \
                       --disable-werror \
                       --disable-guest-agent \
                       --disable-tests \
                       --enable-capstone \
                       --enable-slirp
          make -j$(nproc)
          make install

      - name: Bundle DLLs (Enhanced Portable Logic)
        shell: msys2 {0}
        run: |
          cd /C/QEMU-Portable/bin
          
          # Improved DLL collection: captures all Mingw dependencies found by ldd
          echo "Collecting dependencies..."
          for i in $(ldd qemu-system-x86_64.exe | grep -i "mingw64" | awk '{print $3}'); do
            cp -v "$i" .
          done
          
          # Explicitly copy required BIOS and share data
          # QEMU expects these to be in ../share/qemu relative to the .exe
          mkdir -p ../share/qemu
          cp -r /mingw64/share/qemu/* /C/QEMU-Portable/share/qemu/

      - name: Create SHA512 Checksums
        shell: pwsh
        run: |
          if (Test-Path "C:\QEMU-Portable\bin") {
            cd C:\QEMU-Portable\bin
            Get-ChildItem -File | ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA512).Hash.ToLower()
              "$hash  $($_.Name)" | Out-File -Append -FilePath "..\checksums.sha512" -Encoding ascii
            }
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Portable-QEMU-v9-WHPX
          path: C:\QEMU-Portable
