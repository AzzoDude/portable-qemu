name: Build Portable QEMU (Stealth & Optimized)
on: 
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout QEMU Source
        uses: actions/checkout@v4
        with:
          repository: qemu/qemu
          ref: v9.0.0 
          submodules: 'recursive' # Ensures slirp and other cores are present

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-python
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-dtc
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-gnutls
            mingw-w64-x86_64-libslirp
            mingw-w64-x86_64-capstone

      - name: Patch Hardware Strings (Stealth Mode)
        shell: msys2 {0}
        run: |
          sed -i 's/"QEMU"/"Intel"/g' hw/i386/pc.c
          sed -i 's/"QEMU"/"Intel"/g' hw/scsi/scsi-disk.c
          sed -i 's/"QEMU"/"Intel"/g' target/i386/cpu.c
          sed -i 's/QEMU HARDDISK/INTEL SSD/g' hw/ide/core.c
          sed -i 's/QEMU HARDDISK/INTEL SSD/g' hw/scsi/scsi-disk.c

      - name: Configure and Compile
        shell: msys2 {0}
        run: |
          mkdir build && cd build
          ../configure --target-list=x86_64-softmmu \
                       --enable-whpx \
                       --prefix=/C/QEMU-Portable \
                       --disable-werror \
                       --disable-guest-agent \
                       --enable-capstone \
                       --enable-slirp \
                       --extra-cflags="-O3 -march=native -w" \
                       --mesonopts="-Dtests=disabled -Doptimization=3 -Db_lto=true"
          make -j$(nproc)
          make install

      - name: Bundle DLLs & Firmware
        shell: msys2 {0}
        run: |
          cd /C/QEMU-Portable/bin
          for i in $(ldd qemu-system-x86_64.exe | grep -i "mingw64" | awk '{print $3}'); do
            if [ -f "$i" ]; then cp -v "$i" .; fi
          done
          mkdir -p ../share/qemu
          cp -r /mingw64/share/qemu/* /C/QEMU-Portable/share/qemu/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Portable-QEMU-Final
          path: C:\QEMU-Portable
