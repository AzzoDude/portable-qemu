name: portable-release-actions-workflow

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'QEMU Version (e.g., 20251215)'
        required: true
        default: '20251215'

permissions:
  contents: write    

jobs:
  build:
    name: Create QEMU Portable
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Determine Version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "QEMU_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          else
            # Removes 'v' prefix if present in tag
            VERSION_TAG=${{ github.ref_name }}
            echo "QEMU_VERSION=${VERSION_TAG#v}" >> $GITHUB_ENV
          fi

      - name: Download QEMU Installer
        shell: cmd
        run: |
          curl -L -o qemu-setup.exe https://qemu.weilnetz.de/w64/qemu-w64-setup-%QEMU_VERSION%.exe || (echo "Download Failed - Check version number" && exit 1)
          
      - name: Extract and Selective Cleanup
        shell: cmd
        run: |
          :: Clean start
          if exist installation rd /s /q installation
          mkdir installation

          :: Start installer and wait specifically for it to exit
          echo Installing to %CD%\installation...
          start /wait qemu-setup.exe /S /D=%CD%\installation
          
          :: Wait for file handles to release
          timeout /t 5 /nobreak > nul

          cd installation
          
          :: Verify extraction success
          if not exist qemu-system-x86_64.exe (
            echo "ERROR: Extraction failed. Files not found in installation folder."
            dir ..\
            exit 1
          )

          :: Remove uninstaller
          if exist qemu-uninstall.exe del /f /q qemu-uninstall.exe
          
          :: Selective Architecture Keep
          mkdir tmp_keep
          
          :: Move only the ones we want to keep into tmp
          move qemu-system-x86_64*.exe tmp_keep\
          move qemu-system-i386*.exe tmp_keep\
          move qemu-system-aarch64*.exe tmp_keep\
          move qemu-system-arm*.exe tmp_keep\
          move qemu-img.exe tmp_keep\
          move qemu-io.exe tmp_keep\
          move qemu-nbd.exe tmp_keep\
          
          :: Delete everything else in the root (niche archs)
          del /f /q qemu-system-*.exe
          
          :: Move kept files back and cleanup tmp
          move /y tmp_keep\* .
          rd /s /q tmp_keep
          
      - name: Archive Release
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          directory: "installation"
          filename: "../qemu-w64-portable-${{ env.QEMU_VERSION }}.zip"
          
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "qemu-w64-portable-${{ env.QEMU_VERSION }}.zip"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "QEMU Portable ${{ env.QEMU_VERSION }}"
          body: |
            ## Portable QEMU Build
            **Version:** ${{ env.QEMU_VERSION }}
            
            ### Included:
            - **PC Emulation:** x86_64, i386
            - **Mobile/SBC:** ARM, AArch64
            - **Tools:** qemu-img, qemu-io, qemu-nbd
            
            ### How to Use:
            1. Download and extract the zip.
            2. Run via CMD: `qemu-system-x86_64.exe -L . [your_args]`
