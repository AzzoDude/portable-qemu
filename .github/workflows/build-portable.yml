name: portable-release-actions-workflow

on:
  push:
    tags:
      - '*' # Triggers when you push a tag like 20231215 or 8.2.2-1
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: write    

jobs:
  build:
    name: Create QEMU Portable Release
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Version
        shell: bash
        run: |
          # If triggered by a tag, use the tag. If manual, use a default version.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "QEMU_VERSION=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "QEMU_VERSION=20231215" >> $GITHUB_ENV
          fi

      - name: Download QEMU Installer
        shell: cmd
        run: |
          curl -L -o qemu-setup.exe https://qemu.weilnetz.de/w64/qemu-w64-setup-%QEMU_VERSION%.exe
          
      - name: Extract and Selective Cleanup
        shell: cmd
        run: |
          mkdir installation
          :: Extracting the installer to the 'installation' folder
          qemu-setup.exe /S /D=%CD%\installation
          
          cd installation
          
          :: 1. Remove the uninstaller
          if exist qemu-uninstall.exe del /f /q qemu-uninstall.exe
          
          :: 2. Keep only major architectures to save space
          :: This handles the move-and-delete strategy we discussed
          mkdir tmp_keep
          move qemu-system-x86_64*.exe tmp_keep\
          move qemu-system-i386*.exe tmp_keep\
          move qemu-system-aarch64*.exe tmp_keep\
          move qemu-system-arm*.exe tmp_keep\
          move qemu-img.exe tmp_keep\
          move qemu-io.exe tmp_keep\
          
          :: Delete niche CPU emulators (mips, rx, etc.)
          del /f /q qemu-system-*.exe
          
          :: Move back the essentials
          move tmp_keep\* .
          rd tmp_keep
          
      - name: Archive Release
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          directory: "installation"
          filename: "../qemu-w64-portable-${{ env.QEMU_VERSION }}.zip"
          
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "qemu-w64-portable-${{ env.QEMU_VERSION }}.zip"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "QEMU Portable ${{ env.QEMU_VERSION }}"
          body: |
            ### Portable QEMU for Windows x64
            This is an automated portable build.
            
            **Included Architectures:**
            - x86_64 / i386
            - AArch64 / ARM
            
            **Utilities:**
            - qemu-img (disk management)
            - qemu-io
            
            **Usage:**
            Extract the zip and run `qemu-system-x86_64.exe -L .` via Command Prompt.
