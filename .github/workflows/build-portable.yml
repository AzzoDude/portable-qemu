name: Build Portable QEMU
on: 
  workflow_dispatch: # Allows you to trigger manually from the Actions tab
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout QEMU Source
        uses: actions/checkout@v4
        with:
          repository: qemu/qemu
          ref: v9.0.0 # Stable release

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # Complete list of tools for a standalone, high-performance build
          install: >-
            base-devel
            git
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-python
            mingw-w64-x86_64-python-distlib
            mingw-w64-x86_64-python-setuptools
            mingw-w64-x86_64-python-pip
            mingw-w64-x86_64-python-sphinx
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-dtc
            mingw-w64-x86_64-curl

      - name: Configure and Compile
        shell: msys2 {0}
        run: |
          mkdir build && cd build
          # WHPX is critical for smooth performance on Windows
          ../configure --target-list=x86_64-softmmu \
                       --enable-whpx \
                       --prefix=/C/QEMU-Portable \
                       --disable-werror \
                       --disable-guest-agent
          make -j$(nproc)
          make install

      - name: Bundle DLLs (The Portable Logic)
        shell: msys2 {0}
        run: |
          # Navigate to the output binary directory
          cd /C/QEMU-Portable/bin
          
          # This loop finds every DLL required by the QEMU exe 
          # and copies them from MSYS2 into this folder.
          for i in $(ldd qemu-system-x86_64.exe | grep /mingw64/bin | sed 's/.*=> \(\/mingw64\/bin\/.*\)\s(.*)/\1/'); do
            cp -v "$i" .
          done
          
          # Copy share data (BIOS/Firmware) - Essential for booting Linux
          cp -r /C/msys64/mingw64/share/qemu/* /C/QEMU-Portable/share/qemu/ || true

      - name: Create SHA512 Checksums
        shell: pwsh
        run: |
          cd C:\QEMU-Portable\bin
          Get-ChildItem -File | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA512).Hash.ToLower()
            "$hash  $($_.Name)" | Out-File -Append -FilePath "..\checksums.sha512" -Encoding ascii
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Portable-QEMU-WHPX
          path: C:\QEMU-Portable
