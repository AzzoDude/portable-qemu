name: portable-release-actions-workflow

on:
  push:
    tags:
      - '*'

permissions:
  contents: write    

jobs:
  build:
    name: Create Release
    runs-on: windows-latest
    env:
      targetZip: qemu-w64-portable-${{ github.ref_name }}.zip
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Download Installer
        shell: cmd
        run: |
          curl -L -o qemu-setup.exe https://qemu.weilnetz.de/w64/qemu-w64-setup-${{ github.ref_name }}.exe
          
      - name: Extract and Selective Cleanup
        shell: cmd
        run: |
          mkdir installation
          :: Extract to local folder
          qemu-setup.exe /S /D=%CD%\installation
          cd installation
          
          :: 1. Remove the uninstaller (useless for portable)
          if exist qemu-uninstall.exe del /f /q qemu-uninstall.exe
          
          :: 2. Keep only common architectures (x86_64, i386, aarch64, arm)
          :: This deletes roughly 20+ niche executables like qemu-system-mips, etc.
          mkdir tmp_keep
          move qemu-system-x86_64*.exe tmp_keep\
          move qemu-system-i386*.exe tmp_keep\
          move qemu-system-aarch64*.exe tmp_keep\
          move qemu-system-arm*.exe tmp_keep\
          move qemu-img.exe tmp_keep\
          move qemu-io.exe tmp_keep\
          
          :: Delete other system executables
          del /f /q qemu-system-*.exe
          
          :: Move back the ones we kept
          move tmp_keep\* .
          rd tmp_keep
          
      - name: Archive Release
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          directory: "installation"
          filename: "../${{ env.targetZip }}"
          
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ env.targetZip }}"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "QEMU Portable ${{ github.ref_name }}"
          body: |
            ### Portable QEMU Build
            - **Architectures included:** x86_64, i386, aarch64, arm.
            - **Tools included:** qemu-img, qemu-io.
            - Cleaned of uninstaller and niche CPU emulators.
